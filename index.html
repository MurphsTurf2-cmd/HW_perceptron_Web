<!DOCTYPE html>
<html>
<head>
    <title>ITS 365 Perceptron Lab</title>
    <style>
        .grid { display: grid; grid-template-columns: repeat(4, 50px); gap: 5px; margin-bottom: 20px; }
        .cell { width: 50px; height: 50px; border: 1px solid #000; cursor: pointer; }
        .cell.active { background-color: black; }
    </style>
</head>
<body>
    <h2>Perceptron Classifier</h2>
    <h3>Click Squares</h3>
    <h4>Dark(active)=1-Light(empty)=0</h4>
    <div class="grid" id="pixel-grid"></div>

    <button id="predict">Predict</button>
    <p id="output"></p>

    <script>
        const gridContainer = document.getElementById('pixel-grid');
        for (let i = 0; i < 16; i++) {
            const div = document.createElement('div');
            div.className = 'cell';
            div.onclick = function() { this.classList.toggle('active'); };
            gridContainer.appendChild(div);
        }

        let weights = Array(16).fill(0);

        weights[0] = 0.0; weights[1] = 0.1; weights[2] = 0.1; weights[3] = 0.1;
        weights[4] = -0.1; weights[5] = 0.1; weights[6] = 0.0; weights[7] = 0.0;
        weights[8] = -0.1; weights[9] = 0.1; weights[10] = 0.0; weights[11] = 0.0;
        weights[12] = -0.1; weights[13] = 0.0; weights[14] = -0.1; weights[15] = -0.1;
        
        let bias = 0.0; 

        function activation_function(z) {
            return z >= 0 ? 1 : 0;
        }
        
        function predict(inputs) {
            let linear_product = bias;
            for (let i = 0; i < 16; i++) {
                linear_product += inputs[i] * weights[i];
            }
            return activation_function(linear_product);
        }

            document.getElementById("predict").onclick = function() {
            const cells = document.querySelectorAll('.cell');
            let inputs = [];
            cells.forEach(cell => {
                inputs.push(cell.classList.contains('active') ? 1 : 0);
            });

            let result = predict(inputs);

            document.getElementById("output").innerText = "Result: " + (result === 1 ? "T-Shape" : "L-Shape");
        };
    </script>
</body>
</html>
